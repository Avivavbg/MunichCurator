<style>/* ============ MUNICH CURATOR ============ */
:root {
  --bg: #F6F4EE;
  --ink: #0E0E0C;
  --ink-50: #0E0E0C80;
  --ink-20: #0E0E0C33;
  --ink-10: #0E0E0C1A;
  --ink-05: #0E0E0C0D;
  --sage: #D7E2C9;
  --cream: #EFE2CE;
  --clay: #E8D0C4;
  --sky: #D9E1EC;
  --rose: #F3DDDA;
  --line: #0E0E0C1A;
  --font-display: "Oswald", "Arial Narrow", sans-serif;
  --font-body: "Inter Tight", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;
  --grid-gap: clamp(16px, 2vw, 28px);
  --page-x: clamp(20px, 4vw, 56px);
}

[data-theme="dark"] {
  --bg: #0E0E0C;
  --ink: #F6F4EE;
  --ink-50: #F6F4EE80;
  --ink-20: #F6F4EE33;
  --ink-10: #F6F4EE1A;
  --ink-05: #F6F4EE0D;
  --sage: #3B4A2E;
  --cream: #4A3F2E;
  --clay: #4A362C;
  --sky: #2C3848;
  --rose: #4A2F2C;
  --line: #F6F4EE1A;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  transition: background 0.5s ease, color 0.5s ease;
}
body { min-height: 100vh; }

a { color: inherit; text-decoration: none; }
button { background: none; border: none; color: inherit; font: inherit; cursor: pointer; padding: 0; }
img, svg { display: block; max-width: 100%; }

/* ========== Typography ========== */
.display {
  font-family: var(--font-display);
  font-weight: 500;
  line-height: 0.88;
  letter-spacing: -0.01em;
  text-transform: uppercase;
}
.display-xl {
  font-family: var(--font-display);
  font-weight: 500;
  line-height: 0.85;
  letter-spacing: -0.015em;
  text-transform: uppercase;
  font-size: clamp(64px, 14vw, 220px);
}
.display-lg {
  font-family: var(--font-display);
  font-weight: 500;
  line-height: 0.88;
  letter-spacing: -0.01em;
  text-transform: uppercase;
  font-size: clamp(48px, 9vw, 140px);
}
.display-md {
  font-family: var(--font-display);
  font-weight: 500;
  line-height: 0.9;
  letter-spacing: -0.005em;
  text-transform: uppercase;
  font-size: clamp(36px, 6vw, 88px);
}
.display-sm {
  font-family: var(--font-display);
  font-weight: 500;
  line-height: 0.95;
  text-transform: uppercase;
  font-size: clamp(28px, 4vw, 56px);
}
.body-lg {
  font-family: var(--font-body);
  font-size: clamp(18px, 1.6vw, 24px);
  line-height: 1.35;
  letter-spacing: -0.005em;
  text-wrap: pretty;
}
.body {
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.5;
  letter-spacing: -0.003em;
  text-wrap: pretty;
}
.label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.label-sm {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

/* ========== Dot ========== */
.dot {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--ink-20);
  vertical-align: middle;
}
.dot-accent { background: #A6B88F; }

/* ========== Cursor follower ========== */
.cursor {
  position: fixed;
  top: 0; left: 0;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--ink);
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width 0.25s cubic-bezier(0.2,0.8,0.2,1), height 0.25s cubic-bezier(0.2,0.8,0.2,1), background 0.25s;
  mix-blend-mode: difference;
  background: #F6F4EE;
}
.cursor.is-hover {
  width: 56px; height: 56px;
  background: #F6F4EE;
}
.cursor.is-hover.has-label::before {
  content: attr(data-label);
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #0E0E0C;
  mix-blend-mode: normal;
}
@media (hover: none) {
  .cursor { display: none; }
}

/* ========== Header ========== */
.nav {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 18px var(--page-x);
  display: flex;
  align-items: center;
  justify-content: space-between;
  pointer-events: none;
}
.nav > * { pointer-events: auto; }
.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-display);
  font-size: 18px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}
.nav-brand-mark {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--ink);
  position: relative;
  overflow: hidden;
}
.nav-brand-mark::after {
  content: '';
  position: absolute;
  inset: 6px;
  border-radius: 50%;
  background: var(--bg);
}
.nav-brand-mark::before {
  content: '';
  position: absolute;
  inset: 11px;
  border-radius: 50%;
  background: var(--ink);
}
.nav-links {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 8px;
  background: var(--ink-05);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 100px;
  border: 1px solid var(--ink-10);
}
.nav-link {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 10px 18px;
  border-radius: 100px;
  transition: background 0.3s, color 0.3s;
  position: relative;
}
.nav-link:hover { background: var(--ink-10); }
.nav-link.is-active {
  background: var(--ink);
  color: var(--bg);
}
.nav-cta {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  background: var(--ink);
  color: var(--bg);
  border-radius: 100px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  transition: transform 0.3s;
}
.nav-cta:hover { transform: translateY(-1px); }
.nav-cta .dot { background: #A6B88F; }

.nav-toggle {
  display: none;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--ink-05);
  border: 1px solid var(--ink-10);
  position: relative;
}
.nav-toggle span {
  position: absolute;
  left: 12px; right: 12px;
  height: 1.5px;
  background: var(--ink);
  transition: transform 0.3s, opacity 0.3s;
}
.nav-toggle span:nth-child(1) { top: 17px; }
.nav-toggle span:nth-child(2) { bottom: 17px; }
.nav-toggle.is-open span:nth-child(1) { top: 50%; transform: translateY(-50%) rotate(45deg); }
.nav-toggle.is-open span:nth-child(2) { bottom: 50%; transform: translateY(50%) rotate(-45deg); }

@media (max-width: 900px) {
  .nav-links, nav .nav-cta { display: none; }
  .nav-toggle { display: block; }
}

/* Mobile nav sheet */
.nav-sheet {
  position: fixed;
  inset: 0;
  z-index: 90;
  background: var(--bg);
  padding: 100px var(--page-x) 40px;
  transform: translateY(-100%);
  transition: transform 0.5s cubic-bezier(0.7,0,0.2,1);
  display: flex;
  flex-direction: column;
  gap: 0;
}
.nav-sheet.is-open { transform: translateY(0); }
.nav-sheet-link {
  font-family: var(--font-display);
  font-size: clamp(36px, 10vw, 64px);
  text-transform: uppercase;
  padding: 14px 0;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: baseline;
  gap: 14px;
}
.nav-sheet-link-index {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--ink-50);
}

/* ========== Page transition overlay ========== */
.page-transition {
  position: fixed;
  inset: 0;
  z-index: 9000;
  background: var(--ink);
  transform-origin: bottom;
  transform: scaleY(0);
  pointer-events: none;
}
.page-transition.is-in {
  animation: pt-in 0.55s cubic-bezier(0.7,0,0.2,1) forwards;
}
.page-transition.is-out {
  animation: pt-out 0.55s cubic-bezier(0.7,0,0.2,1) forwards;
}
@keyframes pt-in {
  0% { transform-origin: bottom; transform: scaleY(0); }
  100% { transform-origin: bottom; transform: scaleY(1); }
}
@keyframes pt-out {
  0% { transform-origin: top; transform: scaleY(1); }
  100% { transform-origin: top; transform: scaleY(0); }
}

/* ========== Page shell ========== */
.page {
  padding-top: 100px;
  min-height: 100vh;
}
.section {
  padding: clamp(60px, 10vw, 140px) var(--page-x);
  position: relative;
}
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  margin-bottom: clamp(24px, 4vw, 48px);
  padding-bottom: 18px;
  border-bottom: 1px solid var(--line);
}
.section-head-left { display: flex; align-items: center; gap: 10px; }
.section-head-right { display: flex; align-items: center; gap: 12px; color: var(--ink-50); }

/* ========== Reveal animation ========== */
.reveal {
  opacity: 0;
  transform: translateY(40px);
  transition: opacity 0.9s cubic-bezier(0.2,0.8,0.2,1), transform 0.9s cubic-bezier(0.2,0.8,0.2,1);
}
.reveal.is-in {
  opacity: 1;
  transform: translateY(0);
}
.reveal-stagger > * {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.8s cubic-bezier(0.2,0.8,0.2,1), transform 0.8s cubic-bezier(0.2,0.8,0.2,1);
  transition-delay: calc(var(--i, 0) * 80ms);
}
.reveal-stagger.is-in > * {
  opacity: 1;
  transform: translateY(0);
}

/* Clip reveal for headlines */
.clip-reveal {
  display: inline-block;
  overflow: hidden;
  padding-bottom: 0.05em;
}
.clip-reveal > span {
  display: inline-block;
  transform: translateY(110%);
  transition: transform 1s cubic-bezier(0.7,0,0.2,1);
  transition-delay: calc(var(--i, 0) * 80ms);
}
.clip-reveal.is-in > span {
  transform: translateY(0);
}

/* ========== Blob shapes ========== */
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(40px);
  opacity: 0.9;
  pointer-events: none;
  z-index: 0;
}
.blob-sage { background: var(--sage); }
.blob-cream { background: var(--cream); }
.blob-clay { background: var(--clay); }
.blob-sky { background: var(--sky); }
.blob-rose { background: var(--rose); }

/* ========== Placeholder image ========== */
.ph {
  position: relative;
  background: var(--ink-05);
  overflow: hidden;
  border-radius: 2px;
}
.ph::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(
    135deg,
    transparent 0 14px,
    var(--ink-05) 14px 15px
  );
}
.ph-label {
  position: absolute;
  top: 14px; left: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink);
  z-index: 2;
}
.ph-label .dot { width: 6px; height: 6px; background: var(--ink); }
.ph-index {
  position: absolute;
  bottom: 14px; right: 14px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--ink-50);
  z-index: 2;
}

/* Real photo — same shape as .ph but with actual image */
.photo {
  position: relative;
  overflow: hidden;
  border-radius: 2px;
  background: var(--ink-05);
}
.photo img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 1.2s cubic-bezier(0.2,0.8,0.2,1);
}
.photo:hover img { transform: scale(1.04); }
.photo-label {
  position: absolute;
  top: 14px; left: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #F6F4EE;
  z-index: 2;
  text-shadow: 0 1px 8px rgba(0,0,0,0.4);
}
.photo-label .dot { width: 6px; height: 6px; background: #F6F4EE; }
.photo-index {
  position: absolute;
  bottom: 14px; right: 14px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: #F6F4EE;
  z-index: 2;
  text-shadow: 0 1px 8px rgba(0,0,0,0.4);
}

/* Wide-shot band below hero */
.wide-band {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--grid-gap);
  padding: 0 var(--page-x) clamp(40px, 6vw, 80px);
  position: relative;
  z-index: 2;
}
.wide-band .photo {
  aspect-ratio: 16/10;
}
.wide-band .photo.tall { aspect-ratio: 4/5; }
@media (max-width: 800px) {
  .wide-band { grid-template-columns: 1fr; }
}

/* Workshops grid — 8 items now, adjust spans */
.work-grid .work-card:nth-child(7) { grid-column: span 5; }
.work-grid .work-card:nth-child(8) { grid-column: span 7; }
@media (max-width: 800px) {
  .work-grid .work-card:nth-child(7), .work-grid .work-card:nth-child(8) { grid-column: span 12; }
}

/* ========== Footer ========== */
.footer {
  padding: clamp(60px, 8vw, 100px) var(--page-x) 32px;
  border-top: 1px solid var(--line);
  position: relative;
}
.footer-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: var(--grid-gap);
  margin-bottom: 60px;
}
.footer-col h4 {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-50);
  margin-bottom: 20px;
}
.footer-col a {
  display: block;
  padding: 3px 0;
  font-size: 15px;
}
.footer-col a:hover { text-decoration: underline; text-underline-offset: 4px; }
.footer-big {
  font-family: var(--font-display);
  font-size: clamp(72px, 16vw, 240px);
  line-height: 0.85;
  text-transform: uppercase;
  margin: 60px 0 40px;
  letter-spacing: -0.015em;
}
.footer-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 24px;
  border-top: 1px solid var(--line);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-50);
}
@media (max-width: 800px) {
  .footer-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 500px) {
  .footer-grid { grid-template-columns: 1fr; }
  .footer-bottom { flex-direction: column; gap: 12px; align-items: flex-start; }
}

/* ========== Tweaks panel ========== */
.tweaks {
  position: fixed;
  bottom: 20px; right: 20px;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 16px;
  z-index: 500;
  display: none;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  width: 240px;
}
.tweaks.is-on { display: block; }
.tweaks h5 {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-50);
  margin-bottom: 12px;
}
.tweaks-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
}
.tweaks-row label {
  font-size: 13px;
}
.tweaks-toggle {
  width: 40px; height: 22px;
  background: var(--ink-10);
  border-radius: 22px;
  position: relative;
  transition: background 0.3s;
  cursor: pointer;
}
.tweaks-toggle::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--ink);
  transition: transform 0.3s;
}
.tweaks-toggle.is-on { background: #A6B88F; }
.tweaks-toggle.is-on::after { transform: translateX(18px); }

.tweaks-swatches {
  display: flex;
  gap: 6px;
}
.tweaks-swatch {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s;
}
.tweaks-swatch.is-active {
  border-color: var(--ink);
  transform: scale(1.1);
}

/* ========== Home Hero ========== */
.hero {
  padding: clamp(120px, 14vw, 180px) var(--page-x) clamp(140px, 22vw, 300px);
  position: relative;
  overflow: hidden;
  min-height: 88vh;
}
.hero-eyebrow {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: clamp(40px, 8vw, 80px);
  color: var(--ink-50);
}
.hero-title-wrap {
  position: relative;
  z-index: 2;
}
.hero-title-new {
  text-align: center;
  padding: clamp(20px, 4vw, 60px) 0;
}
.hero-title-line {
  font-family: "Bricolage Grotesque", "Arial Black", sans-serif;
  font-weight: 800;
  font-size: clamp(40px, 7vw, 110px);
  line-height: 0.92;
  letter-spacing: -0.03em;
  color: var(--ink);
  display: block;
  overflow: hidden;
  padding-bottom: 0.06em;
  animation: heroLineIn 0.9s cubic-bezier(0.2,0.8,0.2,1) both;
}
.hero-title-line-2 {
  animation-delay: 0.12s;
}
@keyframes heroLineIn {
  from { opacity: 0; transform: translateY(48px); }
  to   { opacity: 1; transform: translateY(0); }
}
.hero-title {
  font-family: var(--font-display);
  font-weight: 500;
  line-height: 0.85;
  letter-spacing: -0.02em;
  text-transform: uppercase;
  font-size: clamp(72px, 16vw, 260px);
}
.hero-title-row {
  display: flex;
  align-items: baseline;
  gap: 0.15em;
  flex-wrap: wrap;
}
.hero-title-row.row-2 {
  justify-content: flex-end;
}
.hero-title-row.row-3 {
  justify-content: center;
  padding-left: 10vw;
}
.hero-title-note {
  font-family: var(--font-body);
  font-size: 14px;
  text-transform: none;
  letter-spacing: 0;
  color: var(--ink-50);
  line-height: 1.3;
  max-width: 200px;
  align-self: center;
  font-weight: 400;
  padding: 0 12px;
}
.hero-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--grid-gap);
  margin-top: clamp(60px, 10vw, 120px);
  padding-top: 30px;
  border-top: 1px solid var(--line);
  position: relative;
  z-index: 2;
}
.hero-meta-col { display: flex; flex-direction: column; gap: 14px; }
.hero-meta-col .label { color: var(--ink-50); }
.hero-meta-col p { max-width: 40ch; }
@media (max-width: 700px) {
  .hero-meta { grid-template-columns: 1fr; }
  .hero-title-row.row-3 { padding-left: 0; }
}

.hero-blob-1 {
  width: clamp(300px, 45vw, 700px);
  height: clamp(300px, 45vw, 700px);
  top: 20%;
  right: -10%;
  background: var(--sage);
  border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
  filter: blur(2px);
  animation: blobFloat 22s ease-in-out infinite alternate;
}
.hero-blob-2 {
  width: clamp(200px, 30vw, 460px);
  height: clamp(200px, 30vw, 460px);
  bottom: -10%;
  left: -8%;
  background: var(--cream);
  border-radius: 55% 45% 60% 40% / 45% 55% 50% 50%;
  filter: blur(2px);
  animation: blobFloat 26s ease-in-out infinite alternate-reverse;
}
@keyframes blobFloat {
  0% { transform: translate(0,0) rotate(0); }
  100% { transform: translate(30px, -40px) rotate(20deg); }
}

/* ========== Marquee ========== */
.marquee {
  overflow: hidden;
  padding: 20px 0;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  position: relative;
  z-index: 2;
  background: var(--bg);
}
.marquee-track {
  display: flex;
  gap: 60px;
  animation: marquee 40s linear infinite;
  white-space: nowrap;
  width: max-content;
}
.marquee-track span {
  font-family: var(--font-display);
  font-size: clamp(28px, 4vw, 48px);
  text-transform: uppercase;
  letter-spacing: -0.005em;
  display: inline-flex;
  align-items: center;
  gap: 60px;
}
.marquee-track .dot {
  width: 14px; height: 14px;
  background: #A6B88F;
}
@keyframes marquee {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* ========== Work grid ========== */
.work-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: var(--grid-gap);
}
.work-card {
  grid-column: span 6;
  position: relative;
  cursor: pointer;
}
.work-card:nth-child(3) { grid-column: span 5; }
.work-card:nth-child(4) { grid-column: span 7; }
.work-card:nth-child(5) { grid-column: span 7; }
.work-card:nth-child(6) { grid-column: span 5; }
.work-card-media {
  aspect-ratio: 4/3;
  position: relative;
  overflow: hidden;
  border-radius: 4px;
  transition: transform 0.6s cubic-bezier(0.2,0.8,0.2,1);
}
.work-card:hover .work-card-media { transform: scale(0.98); }
.work-card-media .ph::before { transition: transform 1.2s cubic-bezier(0.2,0.8,0.2,1); }
.work-card:hover .work-card-media .ph::before { transform: scale(1.05) rotate(2deg); }
.work-card-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-top: 18px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line);
}
.work-card-title {
  font-family: var(--font-display);
  font-size: clamp(22px, 2.4vw, 32px);
  text-transform: uppercase;
  letter-spacing: -0.005em;
}
.work-card-tags {
  display: flex;
  gap: 14px;
  margin-top: 10px;
  color: var(--ink-50);
}
@media (max-width: 800px) {
  .work-card, .work-card:nth-child(3), .work-card:nth-child(4),
  .work-card:nth-child(5), .work-card:nth-child(6) { grid-column: span 12; }
}

/* ========== About / Studio ========== */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(40px, 6vw, 100px);
  align-items: start;
}
@media (max-width: 800px) { .two-col { grid-template-columns: 1fr; } }

.about-stat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--grid-gap);
  padding: clamp(40px, 5vw, 60px) 0;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.about-stat {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.about-stat-num {
  font-family: var(--font-display);
  font-size: clamp(48px, 7vw, 96px);
  line-height: 0.88;
  letter-spacing: -0.015em;
}
.about-stat-label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-50);
}
@media (max-width: 700px) { .about-stat-grid { grid-template-columns: 1fr 1fr; } }

/* ========== Sectors / Categories ========== */
.sector-row {
  display: grid;
  grid-template-columns: 60px 1fr auto 1fr;
  gap: 24px;
  align-items: center;
  padding: 24px 0;
  border-top: 1px solid var(--line);
  cursor: pointer;
  transition: padding 0.4s cubic-bezier(0.2,0.8,0.2,1);
  position: relative;
}
.sector-row:last-child { border-bottom: 1px solid var(--line); }
.sector-row:hover { padding: 24px 16px; }
.sector-row:hover .sector-name { transform: translateX(8px); }
.sector-index {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--ink-50);
}
.sector-name {
  font-family: var(--font-display);
  font-size: clamp(28px, 5vw, 56px);
  text-transform: uppercase;
  letter-spacing: -0.005em;
  transition: transform 0.4s cubic-bezier(0.2,0.8,0.2,1);
}
.sector-count {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--ink-50);
}
.sector-desc {
  color: var(--ink-50);
  font-size: 14px;
  max-width: 40ch;
  line-height: 1.4;
}
.sector-thumb {
  position: absolute;
  right: 0; top: 50%;
  transform: translate(60%, -50%) scale(0.8);
  width: 200px; height: 140px;
  opacity: 0;
  pointer-events: none;
  transition: transform 0.5s cubic-bezier(0.2,0.8,0.2,1), opacity 0.5s;
  z-index: 5;
}
.sector-row:hover .sector-thumb {
  opacity: 1;
  transform: translate(-10%, -50%) scale(1) rotate(-4deg);
}
@media (max-width: 800px) {
  .sector-row { grid-template-columns: 40px 1fr auto; }
  .sector-desc { display: none; }
  .sector-thumb { display: none; }
}

/* ========== CTA band ========== */
.cta-band {
  padding: clamp(80px, 12vw, 160px) var(--page-x);
  position: relative;
  overflow: hidden;
  text-align: center;
}
.cta-band-bg {
  position: absolute;
  inset: 0;
  background: var(--sage);
  z-index: -1;
}
.cta-band h2 {
  font-family: var(--font-display);
  font-size: clamp(48px, 10vw, 140px);
  line-height: 0.88;
  letter-spacing: -0.015em;
  text-transform: uppercase;
  max-width: 18ch;
  margin: 0 auto 40px;
}
.cta-band .nav-cta {
  display: inline-flex;
}

/* ========== Workshops page ========== */
.wk-hero {
  padding: clamp(120px, 14vw, 180px) var(--page-x) 40px;
  position: relative;
}
.wk-list {
  padding: 40px var(--page-x) 120px;
}
.wk-item-wrap {
  border-top: 1px solid var(--line);
}
.wk-item-wrap:last-child {
  border-bottom: 1px solid var(--line);
}
.wk-item {
  display: grid;
  grid-template-columns: 70px 80px 2fr 1fr 180px;
  gap: 24px;
  align-items: center;
  padding: 20px 0;
  cursor: pointer;
  position: relative;
}
.wk-item-thumb {
  width: 70px;
  height: 70px;
  overflow: hidden;
  border-radius: 2px;
  background: var(--ink-05);
}
.wk-item-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.6s ease;
}
.wk-item:hover .wk-item-thumb img { transform: scale(1.08); }
.wk-item:hover { background: var(--ink-05); }
.wk-accordion {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1);
}
.wk-accordion.is-open {
  max-height: 220px;
}
.wk-accordion-inner {
  display: flex;
  gap: 48px;
  padding: 4px 0 24px calc(70px + 80px + 48px);
  align-items: flex-start;
}
.wk-accordion-desc {
  flex: 1;
  font-size: 14px;
  line-height: 1.65;
  color: var(--ink-50);
  max-width: 52ch;
}
.wk-accordion-meta {
  display: flex;
  gap: 32px;
  flex-shrink: 0;
}
.wk-accordion-meta-item {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-50);
  line-height: 1.6;
}
.wk-accordion-meta-item strong {
  display: block;
  color: var(--ink);
  margin-bottom: 3px;
}
.wk-item-date {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.wk-item-day {
  font-family: var(--font-display);
  font-size: 32px;
  line-height: 0.9;
}
.wk-item-month {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-50);
}
.wk-item-title {
  font-family: var(--font-display);
  font-size: clamp(22px, 2.2vw, 28px);
  text-transform: uppercase;
  line-height: 0.95;
}
.wk-item-meta {
  color: var(--ink-50);
  font-size: 13px;
  line-height: 1.4;
}
.wk-item-cat {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.wk-item-cat .dot { margin-right: 6px; }
.wk-item-cta {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.wk-item-cta-circle {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1px solid var(--ink);
  display: grid;
  place-items: center;
  transition: background 0.3s, color 0.3s;
}
.wk-item:hover .wk-item-cta-circle {
  background: var(--ink);
  color: var(--bg);
}
@media (max-width: 900px) {
  .wk-item { grid-template-columns: 56px 1fr; gap: 16px; }
  .wk-item-thumb, .wk-item-cat { display: none; }
  .wk-item-cta { grid-column: 1 / -1; justify-content: flex-start; padding-top: 4px; padding-bottom: 12px; }
  .wk-accordion-inner { padding: 4px 0 20px 0; flex-direction: column; gap: 16px; }
  .wk-accordion-meta { flex-direction: column; gap: 12px; }
}

select, select option {
  font-family: var(--font-body) !important;
  font-weight: 400 !important;
  font-size: 18px !important;
}
.wk-filter {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  padding: 20px 0 28px;
}
.wk-chip {
  padding: 8px 14px;
  border-radius: 100px;
  border: 1px solid var(--line);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.3s, color 0.3s, border-color 0.3s;
}
.wk-chip:hover { border-color: var(--ink); }
.wk-chip.is-active {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}

/* ========== Makers page ========== */
.maker-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--grid-gap);
}
.maker-card {
  cursor: pointer;
}
.maker-card-media {
  aspect-ratio: 4/5;
  position: relative;
  overflow: hidden;
  border-radius: 4px;
  transition: transform 0.5s cubic-bezier(0.2,0.8,0.2,1);
}
.maker-card:hover .maker-card-media { transform: scale(0.98); }
.maker-card-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 16px 0;
  border-bottom: 1px solid var(--line);
  margin-top: 8px;
}
.maker-card-name {
  font-family: var(--font-display);
  font-size: clamp(20px, 2vw, 28px);
  text-transform: uppercase;
}
.maker-card-craft {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-50);
}
@media (max-width: 800px) { .maker-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 500px) { .maker-grid { grid-template-columns: 1fr; } }

/* ========== Shops page ========== */
.shop-list-item {
  display: grid;
  grid-template-columns: 60px 2fr 1fr 1fr 60px;
  gap: 24px;
  padding: 32px 0;
  border-top: 1px solid var(--line);
  align-items: center;
  cursor: pointer;
}
.shop-list-item:last-child { border-bottom: 1px solid var(--line); }
.shop-list-item:hover .shop-name { font-style: italic; }
.shop-name {
  font-family: var(--font-display);
  font-size: clamp(24px, 3vw, 40px);
  text-transform: uppercase;
  line-height: 0.95;
  transition: font-style 0.3s;
}
.shop-hood, .shop-type {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-50);
}
.shop-arrow {
  font-family: var(--font-display);
  font-size: 28px;
  text-align: right;
}
@media (max-width: 700px) {
  .shop-list-item { grid-template-columns: 40px 1fr auto; }
  .shop-hood, .shop-type { display: none; }
}

/* ========== Journal ========== */
.journal-hero-card {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: var(--grid-gap);
  padding: 40px 0;
  border-bottom: 1px solid var(--line);
  margin-bottom: 60px;
}
.journal-hero-card .ph { aspect-ratio: 4/3; }
.journal-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--grid-gap);
}
.journal-card .ph { aspect-ratio: 4/3; margin-bottom: 16px; }
.journal-card-title {
  font-family: var(--font-display);
  font-size: clamp(20px, 2vw, 28px);
  text-transform: uppercase;
  line-height: 1;
  margin-bottom: 10px;
}
.journal-card-meta {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-50);
  padding-top: 12px;
  border-top: 1px solid var(--line);
}
@media (max-width: 900px) {
  .journal-hero-card { grid-template-columns: 1fr; }
  .journal-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 500px) {
  .journal-grid { grid-template-columns: 1fr; }
}

/* ========== Process ========== */
.process-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--grid-gap);
}
.process-step {
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding-top: 24px;
  border-top: 1px solid var(--ink);
}
.process-step-num {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
}
.process-step-title {
  font-family: var(--font-display);
  font-size: clamp(22px, 2.2vw, 32px);
  text-transform: uppercase;
  line-height: 0.95;
}
.process-step p {
  color: var(--ink-50);
  font-size: 14px;
  line-height: 1.5;
}
@media (max-width: 900px) { .process-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 500px) { .process-grid { grid-template-columns: 1fr; } }

/* ========== Small helpers ========== */
.u-flex { display: flex; }
.u-flex-col { flex-direction: column; }
.u-gap-sm { gap: 8px; }
.u-gap-md { gap: 16px; }
.u-gap-lg { gap: 24px; }
.u-align-center { align-items: center; }
.u-max-prose { max-width: 58ch; }
.u-mt-lg { margin-top: 40px; }
.u-mb-lg { margin-bottom: 40px; }
.u-accent-sage { color: #6F8758; }

/* ========== Hero Carousel ========== */
.hero-carousel {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  top: 38%;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
}
.hero-carousel-track {
  display: flex;
  align-items: center;
  height: 100%;
  animation: heroCarouselRTL 50s linear infinite;
  will-change: transform;
}
@keyframes arrowBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(9px); }
}
@keyframes heroCarouselRTL {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.hero-carousel-item {
  flex-shrink: 0;
  opacity: 0.28;
}
.hero-carousel-item img,
.hero-carousel-item video {
  display: block;
  border-radius: 10px;
  object-fit: cover;
  pointer-events: none;
}
</style>
</head>

const Reveal = ({ children, className, stagger, as, style }) => {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          el.classList.add("is-in");
          io.unobserve(el);
        }
      });
    }, { threshold: 0.15 });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  const Tag = as || "div";
  return (
    <Tag ref={ref} className={(stagger ? "reveal-stagger " : "reveal ") + (className || "")} style={style}>
      {children}
    </Tag>);

};

/* ═══════════════════════════════════════════════════════════════════
   HERO TUBES — Bouncy inflated noodle shapes, YourCreative-style.

   Inspired by the thick rubber-tube squiggles on yourcreative.com.au.
   Each shape is a fat SVG path (50–70px stroke) with rounded caps,

   Spring bounce animation:
     • Main travel: cubic-bezier(0.34, 1.56, 0.64, 1) — overshoots,
       then settles. Creates the "hop/bounce" feel.
     • Secondary bob on the SVG: slow sinusoidal Y drift while traveling.
     • Each hop cycle: enter 0% → peak overshoot 60% → settle 100%

   All shapes enter from top-right, exit to different sides:
     0 — Sage  : top-right → left-mid    (horizontal bounce)
     1 — Clay  : top-right → bottom-left (diagonal bounce)
     2 — Sky   : top-right → bottom-mid  (drop bounce)
   ═══════════════════════════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════════════════════════
   HERO TUBES — Path-following hop motion. Flat matte finish, no shadow.

   The wrapper follows a curved SVG path across the hero (top-right →
   various exits) using multiple keyframe stops that trace the arc.
   spring cubic-bezier(0.34, 1.56, 0.64, 1) at each hop stop gives
   the bouncy landing. The shape itself is a single flat solid stroke —
   no shadow, no specular, just the brand colour at full opacity.
   ═══════════════════════════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════════════════════════
   HERO TUBES — Sliding snake via stroke-dashoffset path tracing.

   Each tube is a long SVG path (top-right → exit side). A fixed-length
   segment travels along it by animating stroke-dashoffset from
   (totalLen + segLen) → -segLen. The head draws in, the tail draws
   out — exactly like a snake slithering across the screen.

   pathLength="1000" normalises all paths to the same unit space.
   segment = 380 units (38% of path visible at any time).
   draw-in = first 380 units; hold = full segment on screen;
   draw-out = tail disappears off the far end.
   ═══════════════════════════════════════════════════════════════════ */
const SEG = 380; // visible snake length (in pathLength units)
const TOTAL = 1000; // normalised total path length

const TUBE_CFGS = [
{
  id: "sage",
  color: "#A8C490",
  sw: 52,
  dur: 5000,

  d: "M -100,80 C 120,50 320,210 500,170 C 680,130 780,310 960,280 C 1140,250 1240,420 1420,390 C 1600,360 1740,280 1880,260"
},

const HeroTubes = () => {
  const [idx, setIdx] = React.useState(0);
  const [rev, setRev] = React.useState(0);

  React.useEffect(() => {
    const tid = setTimeout(() => {
      setIdx((i) => (i + 1) % TUBE_CFGS.length);
      setRev((r) => r + 1);
    }, TUBE_CFGS[idx].dur + HERO_PAUSE);
    return () => clearTimeout(tid);
  }, [rev]);

  const cfg = TUBE_CFGS[idx];

  // stroke-dasharray: SEG gap(TOTAL) so only one segment is visible
  // stroke-dashoffset animates from (TOTAL+SEG) → -SEG
  // easing: ease-in-out for smooth slither
  const kf = TUBE_CFGS.map((c) => `
    @keyframes snake-${c.id} {
      0%   { stroke-dashoffset: ${TOTAL + SEG}; }
      100% { stroke-dashoffset: ${-SEG}; }
    }
  `).join('\n');

  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden", pointerEvents: "none", zIndex: 0 }}>
      <style dangerouslySetInnerHTML={{ __html: kf }} />
      <svg
        key={rev}
        width="100%" height="100%"
        viewBox="0 0 1600 600"
        preserveAspectRatio="xMidYMid slice"
        style={{ display: "block", position: "absolute", inset: 0 }}>
        
        <path
          d={cfg.d}
          stroke={cfg.color}
          strokeWidth={cfg.sw}
          fill="none"
          strokeLinecap="round"
          strokeLinejoin="round"
          pathLength={TOTAL}
          strokeDasharray={`${SEG} ${TOTAL}`}
          style={{
            animation: `snake-${cfg.id} ${cfg.dur}ms linear forwards`
          }} />
        
      </svg>
    </div>);

};

const Contact = ({ navigate }) => {
  const [role, setRole] = React.useState("participant");
  const [formStatus, setFormStatus] = React.useState("idle"); // idle | sending | sent | error
  const handleSubmit = async (e) => {
    e.preventDefault();
    setFormStatus("sending");
    const data = new FormData(e.target);
    data.append("_subject", "New message from Munich Curator website");
    // Snapshot form fields for analytics (no PII sent until success)
    const email = (data.get("email") || "").toString().trim().toLowerCase();
    const name = (data.get("name") || "").toString().trim();
    const workshop = (data.get("workshop") || "").toString();
    const company = (data.get("company") || "").toString();
    try {
      const res = await fetch("https://formsubmit.co/ajax/hallo@munichcurator.com", {
        method: "POST", body: data, headers: { Accept: "application/json" }
      });
      setFormStatus(res.ok ? "sent" : "error");
      // PostHog: identify user + capture events on success/failure
      if (window.posthog && typeof window.posthog.capture === "function") {
        if (res.ok && email) {
          // Link all past anonymous events from this browser to this person profile
          window.posthog.identify(email, {
            email: email,
            name: name || undefined,
            role: role,
            workshop_interest: workshop || undefined,
            company: company || undefined,
            first_form_submitted_at: new Date().toISOString()
          });
          window.posthog.capture("contact_form_submitted", { role: role, workshop: workshop || null, has_company: !!company });
        } else if (!res.ok) {
          window.posthog.capture("contact_form_error", { role: role, status: res.status, error_type: "http_error" });
        }
      }
    } catch (err) {
      setFormStatus("error");
      if (window.posthog && typeof window.posthog.capture === "function") {
        window.posthog.capture("contact_form_error", { role: role, error_type: "network_error" });
      }
    }
  };
  return (

                      </div>

                    <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                      <span className="label" style={{ color: "var(--ink-50)" }}>— {role === "maker" ? "Instagram / Portfolio link" : "Shop name"}</span>
                      <input type="text" name="company" required style={{ background: "transparent", border: "none", borderBottom: "1px solid var(--line)", padding: "10px 0", fontFamily: "var(--font-body)", fontSize: 18, color: "var(--ink)", outline: "none" }} />
                    </label>
                  )}
                  <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    <span className="label" style={{ color: "var(--ink-50)" }}>— Message</span>
                    <textarea name="message" required rows="4" style={{ background: "transparent", border: "none", borderBottom: "1px solid var(--line)", padding: "10px 0", fontFamily: "var(--font-body)", fontSize: 18, color: "var(--ink)", outline: "none", resize: "vertical" }} />
                  </label>
                  {formStatus === "error" && <p style={{ color: "#c0392b", fontSize: 14 }}>Something went wrong — please try again or email us directly.</p>}
                  <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
                    <button type="submit" disabled={formStatus === "sending"} className="nav-cta" style={{ alignSelf: "flex-start", marginTop: 20, opacity: formStatus === "sending" ? 0.6 : 1 }}>
                      <Dot accent /> {formStatus === "sending" ? "Sending…" : "Send"}
                    </button>
                    {role === "participant" && (
                      <p style={{ fontFamily: "var(--font-body)", fontSize: 12, color: "var(--ink-50)", letterSpacing: "0.01em", marginTop: 12, maxWidth: "38ch", lineHeight: 1.5 }}>Go ahead, tap &#34;Send&#34; — no payment is currently collected.</p>
                    )}
                  </div>
                </form>
              )}
            </div>
            <div>
              <h3 className="display-sm" style={{ marginTop: 0, marginBottom: 24, maxWidth: "18ch", lineHeight: 1.45 }}>Heßstraße 89, 80797 München, Germany</h3>
              <div style={{ display: "flex", gap: 12, alignItems: "center", marginTop: 32 }}>

                <a href="https://www.instagram.com/munich_curator/" target="_blank" rel="noopener noreferrer" title="Instagram" style={{ display: "flex", alignItems: "center", justifyContent: "center", width: 40, height: 40, borderRadius: "50%", border: "1px solid var(--line)", color: "var(--ink)", textDecoration: "none", transition: "background 0.2s" }} onMouseEnter={e => e.currentTarget.style.background="var(--ink-05)"} onMouseLeave={e => e.currentTarget.style.background="transparent"}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
                </a>
                <a href="mailto:Hallo@munichcurator.com" title="Email" style={{ display: "flex", alignItems: "center", justifyContent: "center", width: 40, height: 40, borderRadius: "50%", border: "1px solid var(--line)", color: "var(--ink)", textDecoration: "none", transition: "background 0.2s" }} onMouseEnter={e => e.currentTarget.style.background="var(--ink-05)"} onMouseLeave={e => e.currentTarget.style.background="transparent"}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>

Object.assign(window, { Shops, Contact });

/* App shell — router, nav, cursor, theme, tweaks */

const ROUTES = [
{ key: "home", label: "Home", component: "Home" },
{ key: "workshops", label: "Workshops", component: "Workshops" },
{ key: "shops", label: "Shops", component: "Shops" },
{ key: "studio", label: "About", component: "Studio" },
{ key: "contact", label: "Contact", component: "Contact" }];


const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "accent": "sage"
} /*EDITMODE-END*/;

const ACCENTS = {
  sage: { bg: "#F6F4EE", blob: "#D7E2C9", name: "Sage" },
  cream: { bg: "#F6F4EE", blob: "#EFE2CE", name: "Cream" },
  rose: { bg: "#F6F4EE", blob: "#F3DDDA", name: "Rose" },
  sky: { bg: "#F6F4EE", blob: "#D9E1EC", name: "Sky" }
};

const useCursor = () => {
  React.useEffect(() => {
    if (window.matchMedia && window.matchMedia("(hover: none)").matches) return;
    const c = document.createElement("div");
    c.className = "cursor";
    document.body.appendChild(c);
    let x = window.innerWidth / 2,y = window.innerHeight / 2,tx = x,ty = y;
    const onMove = (e) => {tx = e.clientX;ty = e.clientY;};
    window.addEventListener("mousemove", onMove);
    let raf;
    const loop = () => {
      x += (tx - x) * 0.2;
      y += (ty - y) * 0.2;
      c.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%)`;
      raf = requestAnimationFrame(loop);
    };
    loop();
    const onOver = (e) => {
      const el = e.target.closest("a, button, [data-cursor-label], .sector-row, .work-card, .maker-card, .wk-item, .shop-list-item, .journal-card");
      if (el) {
        c.classList.add("is-hover");
        const label = el.getAttribute("data-cursor-label");
        if (label) {
          c.classList.add("has-label");
          c.setAttribute("data-label", label);
        } else {
          c.classList.remove("has-label");
        }
      } else {
        c.classList.remove("is-hover", "has-label");
      }
    };
    document.addEventListener("mouseover", onOver);
    return () => {
      window.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseover", onOver);
      cancelAnimationFrame(raf);
      c.remove();
    };
  }, []);
};

const App = () => {
  const getInitialRoute = () => {
    const hash = window.location.hash.replace(/^#\/?/, "");
    const saved = localStorage.getItem("mc-route");
    const target = hash || saved || "home";
    return ROUTES.find((r) => r.key === target) ? target : "home";
  };

  const [route, setRoute] = React.useState(getInitialRoute);
  const [navOpen, setNavOpen] = React.useState(false);
  const [transition, setTransition] = React.useState(null); // null | "in" | "out"
  const [routeParams, setRouteParams] = React.useState({});
  const [editMode, setEditMode] = React.useState(false);
  const [tweaks, setTweaks] = React.useState(TWEAKS_DEFAULTS);
  const mainRef = React.useRef(null);

  useCursor();

  // Apply theme
  React.useEffect(() => {
    document.documentElement.setAttribute("data-theme", tweaks.theme === "dark" ? "dark" : "light");
  }, [tweaks.theme]);

  // Persist route + fire PostHog SPA pageview
  React.useEffect(() => {
    localStorage.setItem("mc-route", route);
    window.location.hash = "#/" + route;
    window.scrollTo({ top: 0, behavior: "instant" });
    // PostHog: manual $pageview for hash-based SPA routing
    if (window.posthog && typeof window.posthog.capture === "function") {
      window.posthog.capture("$pageview", { route: route });
    }
  }, [route]);

  // Hash sync (back/forward)
  React.useEffect(() => {
    const onHash = () => {
      const hash = window.location.hash.replace(/^#\/?/, "");
      if (hash && ROUTES.find((r) => r.key === hash) && hash !== route) {
        setRoute(hash);
      }
    };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, [route]);

  // Edit mode messaging
  React.useEffect(() => {
    const handler = (e) => {
      if (!e.data || !e.data.type) return;
      if (e.data.type === "__activate_edit_mode") setEditMode(true);
      if (e.data.type === "__deactivate_edit_mode") setEditMode(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  const navigate = (target, params) => {
    if (target === route) {setNavOpen(false);return;}
    setNavOpen(false);
    setRouteParams(params || {});
    setTransition("in");
    setTimeout(() => {
      setRoute(target);
      setTransition("out");
      setTimeout(() => setTransition(null), 560);
    }, 560);
  };

  const updateTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [key]: val } }, "*");
  };

  const Current = window[ROUTES.find((r) => r.key === route).component];
  const title = ROUTES.find((r) => r.key === route).label;

  return (
    <>
      {/* Nav */}
      <nav className="nav">
        <a href="#/" className="nav-brand" onClick={(e) => {e.preventDefault();navigate("home");}}>
          <span className="nav-brand-mark"></span>
          <span>MUNICH CURATOR
</span>
        </a>
        <div className="nav-links">
          {ROUTES.filter((r) => r.key !== "home" && r.key !== "contact").map((r) => <a
            key={r.key}
            href={"#/" + r.key}
            className={"nav-link" + (route === r.key ? " is-active" : "")}
            onClick={(e) => {e.preventDefault();navigate(r.key);}}>
              
              {r.label}
            </a>
          )}
        </div>
        <a href="#/contact" className="nav-cta" onClick={(e) => {e.preventDefault();navigate("contact");}}>
          <Dot accent /> Contact us
        </a>
        <button className={"nav-toggle" + (navOpen ? " is-open" : "")} onClick={() => setNavOpen(!navOpen)} aria-label="Menu">
          <span></span><span></span>
        </button>
      </nav>

      {/* Mobile nav sheet */}
      <div className={"nav-sheet" + (navOpen ? " is-open" : "")}>
        {ROUTES.map((r, i) =>
        <a key={r.key} href={"#/" + r.key} className="nav-sheet-link" onClick={(e) => {e.preventDefault();navigate(r.key);}}>
            <span className="nav-sheet-link-index">0{i + 1}</span>
            <span>{r.label}</span>
          </a>
        )}
      </div>

      {/* Page */}
      <main ref={mainRef} key={route} data-screen-label={title}>
        <Current navigate={navigate} params={routeParams} />
      </main>

      {/* Page transition overlay */}
      {transition && <div className={"page-transition is-" + transition}></div>}

      {/* Tweaks */}
      <div className={"tweaks" + (editMode ? " is-on" : "")}>
        <h5>Tweaks</h5>
        <div className="tweaks-row">
          <label>Dark mode</label>
          <div
            className={"tweaks-toggle" + (tweaks.theme === "dark" ? " is-on" : "")}
            onClick={() => updateTweak("theme", tweaks.theme === "dark" ? "light" : "dark")}>
          </div>
        </div>
        <div className="tweaks-row" style={{ flexDirection: "column", alignItems: "flex-start", gap: 10 }}>
          <label>CTA band tone</label>
          <div className="tweaks-swatches">
            {Object.entries(ACCENTS).map(([k, v]) =>
            <div
              key={k}
              className={"tweaks-swatch" + (tweaks.accent === k ? " is-active" : "")}
              style={{ background: v.blob }}
              onClick={() => updateTweak("accent", k)}
              title={v.name}>
            </div>
            )}
          </div>
        </div>
      </div>

      {/* Accent override */}
      <style dangerouslySetInnerHTML={{ __html: `.cta-band-bg { background: ${ACCENTS[tweaks.accent]?.blob || "var(--sage)"} !important; }` }} />
    </>);

};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
